name: Cloud market snapshot

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "deployment/cloud_snapshot.py"
      - ".github/workflows/cloud-snapshot.yml"

permissions:
  contents: write

concurrency:
  group: cloud-market-snapshot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install certificate bundle
        run: python -m pip install --disable-pip-version-check certifi

      - name: Collect public market data
        run: python deployment/cloud_snapshot.py --output snapshots

      - name: Publish updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "Update cloud market snapshot"
            git push
          fi
